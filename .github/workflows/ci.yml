# Pull-request checks. Publication is tag-only through release.yml.
name: CI

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "styles/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "CHANGELOG.md"
      - "MIGRATION.md"
      - ".github/workflows/**"
      - "vite.lib.config.mts"
      - "vitest.config.ts"
      - "tsconfig*.json"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint:pub
      - run: npm run test
