# Pull-request regression fence. Publication is tag-only through release.yml.
name: gate

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "styles/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "CHANGELOG.md"
      - "MIGRATION.md"
      - ".github/workflows/**"
      - "vite.lib.config.mts"
      - "tsconfig*.json"

# The ATLAS_DEV_LINK dev-alias flag is DELIBERATELY absent from this file (ANSWERS Q72): it
# must never be set in a committed build config / CI, so the dev-convenience self-alias can
# never leak into a shipped bundle. The guard step below asserts it stays unset at runtime.
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: guard — ATLAS_DEV_LINK must be unset in CI
        run: '[ -z "${ATLAS_DEV_LINK:-}" ] || { echo "ATLAS_DEV_LINK is set in CI — the dev-alias must never enter a shipped build"; exit 1; }'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint:pub
      - run: npm run test
      - run: npm run gates
